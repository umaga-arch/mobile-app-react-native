name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run a simple echo command
        run: echo "Building mobile-app-react-native"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build